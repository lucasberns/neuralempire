<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- CSP: 'unsafe-eval'/'wasm-unsafe-eval' são exigência do Pyodide (WebAssembly + FFI);
         cdn.jsdelivr.net é a origem dos pacotes Python. Todo o resto fica restrito a 'self'. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; worker-src 'self'; object-src 'none'; base-uri 'self'"
    />
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Neural Empire</title>
  </head>
  <body>
    <!-- Splash inline: aparece no primeiro paint, antes do JS; o React substitui ao montar. -->
    <style>
      .splash {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0d1117;
        color: #e6edf3;
        font-family: system-ui, sans-serif;
      }
      .splash svg { animation: splash-pulse 1.4s ease-in-out infinite; }
      .splash p { margin: 0; color: #8b949e; font-size: 0.9rem; }
      @keyframes splash-pulse {
        50% { transform: scale(1.08); opacity: 0.75; }
      }
    </style>
    <div id="root">
      <div class="splash">
        <svg width="88" height="88" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="14" fill="#161b22" />
          <circle cx="18" cy="20" r="5" fill="#a371f7" />
          <circle cx="18" cy="44" r="5" fill="#a371f7" />
          <circle cx="46" cy="32" r="6" fill="#e6edf3" />
          <path d="M22 21 41 30 M22 43 41 34" stroke="#8957e5" stroke-width="3" stroke-linecap="round" />
        </svg>
        <strong>⚡ Neural Empire</strong>
        <p>Abrindo o laboratório…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
